kind = "web"
previewPath = "/"
title = "Zuu AI Video Studio"
version = "1.0.0"
id = "artifacts/zuu-studio"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21382

[services.development]
run = "pnpm --filter @workspace/zuu-studio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/zuu-studio", "run", "build" ]
serve = "static"
publicDir = "artifacts/zuu-studio/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21382"
BASE_PATH = "/"
